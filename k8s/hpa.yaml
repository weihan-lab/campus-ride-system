apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: campus-backend-hpa
  namespace: default
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: campus-backend 
  minReplicas: 2        
  maxReplicas: 10     
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70 