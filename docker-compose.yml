version: '3.8'

services:
  
  db:
    image: postgres:15-alpine
    container_name: campusride-db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=Campusride@2626
      - POSTGRES_DB=postgres

  
  backend:
    build: ./backend
    container_name: campusride-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      - db

 
  frontend:
    build: ./frontend
    container_name: campusride-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development